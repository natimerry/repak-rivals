name: Upload Release to Nexus Mods

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: read

env:
  NEXUS_API_BASE: https://api.nexusmods.com/v3

jobs:
  upload-to-nexus:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NEXUS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}
      NEXUS_FILE_CATEGORY: ${{ vars.NEXUS_FILE_CATEGORY }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          if [ -z "${NEXUS_API_KEY:-}" ]; then
            echo "Missing required secret: NEXUSMODS_API_KEY" >&2
            exit 1
          fi

      - name: Download release archives
        shell: bash
        run: |
          set -euo pipefail
          tag="$(echo '${{ inputs.plan }}' | jq -r '.announcement_tag')"
          repo="${{ github.repository }}"
          mkdir -p incoming
          gh release download "${tag}" \
            --repo "${repo}" \
            --dir incoming \
            --pattern 'repak-gui-*-pc-windows-msvc.zip' \
            --pattern 'repak-gui-*-unknown-linux-gnu.tar.xz'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libarchive-tools

      - name: Normalize archives for Nexus
        id: archives
        shell: bash
        run: |
          set -euo pipefail

          NEXUS_FILE_GROUP_MAP_JSON='{
            "repak-gui-x86_64-pc-windows-msvc.zip": "1795870",
            "repak-gui-x86_64-unknown-linux-gnu.zip": "1795873"
          }'

          mkdir -p prepared
          manifest="prepared/nexus-assets.jsonl"
          : > "${manifest}"

          shopt -s nullglob
          for asset in incoming/*; do
            base="$(basename "${asset}")"

            case "${base}" in
              *.tar.xz)
                final_name="${base%.tar.xz}.zip"
                temp_dir="$(mktemp -d)"
                bsdtar -xf "${asset}" -C "${temp_dir}"

                if ! find "${temp_dir}" -mindepth 1 -print -quit | grep -q .; then
                  echo "Archive ${base} extracted no files" >&2
                  exit 1
                fi

                (cd "${temp_dir}" && zip -rq "${GITHUB_WORKSPACE}/prepared/${final_name}" .)
                rm -rf "${temp_dir}"
                prepared_path="prepared/${final_name}"
                ;;
              *.zip)
                final_name="${base}"
                prepared_path="prepared/${final_name}"
                cp "${asset}" "${prepared_path}"
                ;;
              *)
                continue
                ;;
            esac

            group_id="$(jq -r --arg name "${final_name}" '.[$name] // empty' <<<"${NEXUS_FILE_GROUP_MAP_JSON}")"
            if [ -z "${group_id}" ]; then
              echo "No Nexus file group mapping found for ${final_name}" >&2
              exit 1
            fi

            display_name="${final_name%.zip}"

            jq -cn \
              --arg path "${prepared_path}" \
              --arg filename "${final_name}" \
              --arg group_id "${group_id}" \
              --arg display_name "${display_name}" \
              '{path: $path, filename: $filename, group_id: $group_id, display_name: $display_name}' \
              >> "${manifest}"
          done

          if [ ! -s "${manifest}" ]; then
            echo "No Nexus upload candidates were prepared" >&2
            exit 1
          fi

          echo "manifest=${manifest}" >> "${GITHUB_OUTPUT}"

      - name: Upload files to Nexus
        shell: bash
        run: |
          set -euo pipefail

          tag="$(echo '${{ inputs.plan }}' | jq -r '.announcement_tag')"
          version="${tag#v}"
          release_url="$(gh api "repos/${{ github.repository }}/releases/tags/${tag}" --jq '.html_url')"

          api_request() {
            local method="$1"
            local path="$2"
            local body="${3:-}"
            local url="${NEXUS_API_BASE}${path}"

            if [ -n "${body}" ]; then
              curl --fail-with-body --silent --show-error \
                -X "${method}" \
                -H "apikey: ${NEXUS_API_KEY}" \
                -H "Content-Type: application/json" \
                "${url}" \
                --data "${body}"
            else
              curl --fail-with-body --silent --show-error \
                -X "${method}" \
                -H "apikey: ${NEXUS_API_KEY}" \
                "${url}"
            fi
          }

          create_single_part_upload() {
            local file_path="$1"
            local filename="$2"
            local file_size="$3"

            local request_body upload_json upload_id presigned_url
            request_body="$(jq -cn --arg filename "${filename}" --argjson size_bytes "${file_size}" '{filename: $filename, size_bytes: $size_bytes}')"
            upload_json="$(api_request POST "/uploads" "${request_body}")"
            upload_id="$(jq -r '.data.id' <<<"${upload_json}")"
            presigned_url="$(jq -r '.data.presigned_url' <<<"${upload_json}")"

            curl --fail-with-body --silent --show-error \
              -X PUT \
              -H "Content-Type: application/octet-stream" \
              --upload-file "${file_path}" \
              "${presigned_url}" \
              >/dev/null

            echo "${upload_id}"
          }

          create_multipart_upload() {
            local file_path="$1"
            local filename="$2"
            local file_size="$3"

            local request_body upload_json upload_id part_size complete_url
            local part_dir xml_file part_count

            request_body="$(jq -cn --arg filename "${filename}" --argjson size_bytes "${file_size}" '{filename: $filename, size_bytes: $size_bytes}')"
            upload_json="$(api_request POST "/uploads/multipart" "${request_body}")"
            upload_id="$(jq -r '.data.id' <<<"${upload_json}")"
            part_size="$(jq -r '.data.parts_size' <<<"${upload_json}")"
            complete_url="$(jq -r '.data.complete_presigned_url' <<<"${upload_json}")"

            part_dir="$(mktemp -d)"
            xml_file="$(mktemp)"

            split -b "${part_size}" -d -a 5 --additional-suffix=.part "${file_path}" "${part_dir}/part-"

            mapfile -t part_files < <(find "${part_dir}" -maxdepth 1 -type f -name 'part-*' | sort)
            mapfile -t part_urls < <(jq -r '.data.parts_presigned_url[]' <<<"${upload_json}")
            part_count="${#part_files[@]}"

            if [ "${part_count}" -ne "${#part_urls[@]}" ]; then
              echo "Multipart upload part count mismatch for ${filename}" >&2
              exit 1
            fi

            {
              echo "<CompleteMultipartUpload>"
              for idx in "${!part_files[@]}"; do
                part_number="$((idx + 1))"
                headers_file="$(mktemp)"

                curl --fail-with-body --silent --show-error \
                  -X PUT \
                  -H "Content-Type: application/octet-stream" \
                  --upload-file "${part_files[idx]}" \
                  -D "${headers_file}" \
                  "${part_urls[idx]}" \
                  >/dev/null

                etag="$(awk 'BEGIN { IGNORECASE = 1 } /^etag:/ { print $2 }' "${headers_file}" | tr -d '\r"')"
                rm -f "${headers_file}"

                if [ -z "${etag}" ]; then
                  echo "Missing ETag for part ${part_number} (${filename})" >&2
                  exit 1
                fi

                printf '  <Part>\n    <PartNumber>%s</PartNumber>\n    <ETag>%s</ETag>\n  </Part>\n' \
                  "${part_number}" "${etag}" >> "${xml_file}"
              done
              echo "</CompleteMultipartUpload>"
            } > "${xml_file}"

            curl --fail-with-body --silent --show-error \
              -X POST \
              -H "Content-Type: application/xml" \
              --data-binary @"${xml_file}" \
              "${complete_url}" \
              >/dev/null

            rm -rf "${part_dir}"
            rm -f "${xml_file}"

            echo "${upload_id}"
          }

          finalise_upload() {
            api_request POST "/uploads/${1}/finalise" >/dev/null
          }

          create_nexus_version() {
            local group_id="$1" upload_id="$2" display_name="$3"
            local version="$4" description="$5" file_category="$6"

            api_request POST "/mod-file-update-groups/${group_id}/versions" \
              "$(jq -cn \
                --arg upload_id "${upload_id}" \
                --arg name "${display_name}" \
                --arg version "${version}" \
                --arg description "${description}" \
                --arg file_category "${file_category}" \
                '{upload_id: $upload_id, name: $name, version: $version, description: $description, file_category: $file_category}')"
          }

          file_category="${NEXUS_FILE_CATEGORY:-main}"
          case "${file_category}" in
            main|optional|miscellaneous) ;;
            *)
              echo "NEXUS_FILE_CATEGORY must be one of: main, optional, miscellaneous" >&2
              exit 1
              ;;
          esac

          release_description="GitHub release ${tag}: ${release_url}"

          while IFS= read -r item; do
            [ -n "${item}" ] || continue

            file_path="$(jq -r '.path'       <<<"${item}")"
            filename="$(jq -r '.filename'    <<<"${item}")"
            group_id="$(jq -r '.group_id'    <<<"${item}")"
            display_name="$(jq -r '.display_name' <<<"${item}")"
            file_size="$(stat -c '%s' "${file_path}")"

            if [ "${file_size}" -gt 104857600 ]; then
              upload_id="$(create_multipart_upload "${file_path}" "${filename}" "${file_size}")"
            else
              upload_id="$(create_single_part_upload "${file_path}" "${filename}" "${file_size}")"
            fi

            finalise_upload "${upload_id}"

            response="$(create_nexus_version \
              "${group_id}" "${upload_id}" "${display_name}" \
              "${version}" "${release_description}" "${file_category}")"

            nexus_file_id="$(jq -r '.data.id' <<<"${response}")"
            echo "Uploaded ${filename} to Nexus file group ${group_id} as file ${nexus_file_id}"
          done < "${{ steps.archives.outputs.manifest }}"